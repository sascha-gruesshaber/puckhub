version: '3.9'

services:
  caddy:
    image: caddy:2-alpine
    container_name: puckhub-edge
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
      platform:
        condition: service_healthy
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    networks:
      - puckhub

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: puckhub-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-puckhub}
      POSTGRES_USER: ${POSTGRES_USER:-puckhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-puckhub}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - puckhub

  # PuckHub API Server
  api:
    image: ghcr.io/sascha-gruesshaber/puckhub-api:latest
    container_name: puckhub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-puckhub}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-puckhub}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost}
      API_PORT: 3001
      AUTO_MIGRATE: ${AUTO_MIGRATE:-true}
      UPLOAD_DIR: /app/uploads
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost}
      CNAME_TARGET: ${CNAME_TARGET:-sites.puckhub.eu}
      SUBDOMAIN_SUFFIX: ${SUBDOMAIN_SUFFIX:-.puckhub.eu}
    volumes:
      - uploads:/app/uploads
    networks:
      - puckhub
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PuckHub Admin UI
  admin:
    image: ghcr.io/sascha-gruesshaber/puckhub-admin:latest
    container_name: puckhub-admin
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
    networks:
      - puckhub
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PuckHub Platform UI
  platform:
    image: ghcr.io/sascha-gruesshaber/puckhub-platform:latest
    container_name: puckhub-platform
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3002
    networks:
      - puckhub
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/platform"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  puckhub:
    driver: bridge
