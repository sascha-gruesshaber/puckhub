name: Build Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            image: puckhub-api
            target: api-runner
          - app: admin
            image: puckhub-admin
            target: admin-runner
          - app: platform
            image: puckhub-platform
            target: platform-runner
          - app: league-site
            image: puckhub-league-site
            target: league-site-runner
          - app: marketing-site
            image: puckhub-marketing-site
            target: marketing-site-runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=PuckHub ${{ matrix.app }}
            org.opencontainers.image.description=Ice hockey league management system (${{ matrix.app }})
            org.opencontainers.image.vendor=Sascha Grüßhaber
            org.opencontainers.image.licenses=Custom Source-Available License

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
            BRANCH=${{ github.ref_name }}

      - name: Generate image summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ matrix.target }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Push:** ${{ github.event_name != 'pull_request' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  deploy-coolify:
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Trigger Coolify Deployments
        run: |
          declare -A apps=(
            ["api"]="gg2jvzuela1o5935uppb0379"
            ["admin"]="z8uae7wusm0mrwciub1pdlsc"
            ["platform"]="npuggfu15bwbi78fifi9qfot"
            ["league-site"]="gawwisg6og45069vs4iw5l12"
            ["marketing-site"]="vswoggggksg2libzsuuevfpf"
          )

          for app in "${!apps[@]}"; do
            uuid="${apps[$app]}"
            echo "Deploying $app (uuid: $uuid)..."
            response=$(curl -s -w "\n%{http_code}" \
              -X GET "https://coolify.gruesshaber.eu/api/v1/deploy?uuid=${uuid}&force=false" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "  Response ($http_code): $body"
            if [ "$http_code" -ge 400 ]; then
              echo "::warning::Failed to trigger deployment for $app (HTTP $http_code)"
            fi
          done

      - name: Deployment summary
        run: |
          echo "## Coolify Deployments Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | UUID |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| api | \`gg2jvzuela1o5935uppb0379\` |" >> $GITHUB_STEP_SUMMARY
          echo "| admin | \`z8uae7wusm0mrwciub1pdlsc\` |" >> $GITHUB_STEP_SUMMARY
          echo "| platform | \`npuggfu15bwbi78fifi9qfot\` |" >> $GITHUB_STEP_SUMMARY
          echo "| league-site | \`gawwisg6og45069vs4iw5l12\` |" >> $GITHUB_STEP_SUMMARY
          echo "| marketing-site | \`vswoggggksg2libzsuuevfpf\` |" >> $GITHUB_STEP_SUMMARY
