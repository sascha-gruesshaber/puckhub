name: Build Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------------------
  # Detect which apps have changes and build a minimal matrix
  # ---------------------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_builds: ${{ steps.set-matrix.outputs.has_builds }}
      apps_deployed: ${{ steps.set-matrix.outputs.apps_deployed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect file changes
        id: changes
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'Dockerfile'
              - '.github/workflows/docker-build.yml'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.base.json'
              - 'packages/config/**'
            api:
              - 'packages/api/**'
              - 'packages/db/**'
            admin:
              - 'apps/admin/**'
              - 'packages/ui/**'
              - 'packages/db/**'
              - 'packages/api/**'
            platform:
              - 'apps/platform/**'
              - 'packages/ui/**'
              - 'packages/db/**'
              - 'packages/api/**'
            league-site:
              - 'apps/league-site/**'
              - 'packages/ui/**'
              - 'packages/db/**'
              - 'packages/api/**'
            marketing-site:
              - 'apps/marketing-site/**'
              - 'packages/ui/**'
              - 'packages/db/**'
              - 'packages/api/**'

      - name: Build matrix from changes
        id: set-matrix
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/') }}
          SHARED: ${{ steps.changes.outputs.shared }}
          CHANGED_API: ${{ steps.changes.outputs.api }}
          CHANGED_ADMIN: ${{ steps.changes.outputs.admin }}
          CHANGED_PLATFORM: ${{ steps.changes.outputs.platform }}
          CHANGED_LEAGUE_SITE: ${{ steps.changes.outputs.league-site }}
          CHANGED_MARKETING_SITE: ${{ steps.changes.outputs.marketing-site }}
        run: |
          INCLUDE="[]"
          DEPLOYED="[]"

          should_build() {
            [[ "$IS_TAG" == "true" || "$SHARED" == "true" || "$1" == "true" ]]
          }

          add_entry() {
            local app=$1 image=$2 target=$3
            INCLUDE=$(echo "$INCLUDE" | jq -c --arg a "$app" --arg i "$image" --arg t "$target" \
              '. + [{"app": $a, "image": $i, "target": $t}]')
            DEPLOYED=$(echo "$DEPLOYED" | jq -c --arg a "$app" '. + [$a]')
          }

          should_build "$CHANGED_API"            && add_entry "api"            "puckhub-api"            "api-runner"
          should_build "$CHANGED_ADMIN"           && add_entry "admin"          "puckhub-admin"          "admin-runner"
          should_build "$CHANGED_PLATFORM"        && add_entry "platform"       "puckhub-platform"       "platform-runner"
          should_build "$CHANGED_LEAGUE_SITE"     && add_entry "league-site"    "puckhub-league-site"    "league-site-runner"
          should_build "$CHANGED_MARKETING_SITE"  && add_entry "marketing-site" "puckhub-marketing-site" "marketing-site-runner"

          COUNT=$(echo "$INCLUDE" | jq length)
          echo "matrix={\"include\":$INCLUDE}" >> $GITHUB_OUTPUT
          echo "has_builds=$([[ $COUNT -gt 0 ]] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "apps_deployed=$DEPLOYED" >> $GITHUB_OUTPUT

          echo "### Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ $COUNT -eq 0 ]]; then
            echo "No app changes detected — **skipping all builds**." >> $GITHUB_STEP_SUMMARY
          else
            echo "Building **$COUNT** of 5 images:" >> $GITHUB_STEP_SUMMARY
            echo "$INCLUDE" | jq -r '.[] | "- \(.app)"' >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Build & push only the images that changed
  # ---------------------------------------------------------------------------
  build-images:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_builds == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=PuckHub ${{ matrix.app }}
            org.opencontainers.image.description=Ice hockey league management system (${{ matrix.app }})
            org.opencontainers.image.vendor=Sascha Grüßhaber
            org.opencontainers.image.licenses=Custom Source-Available License

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}
            BRANCH=${{ github.ref_name }}

      - name: Generate image summary
        run: |
          echo "## Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** \`${{ matrix.target }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Push:** ${{ github.event_name != 'pull_request' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Deploy only the changed apps to Coolify
  # ---------------------------------------------------------------------------
  deploy-coolify:
    runs-on: ubuntu-latest
    needs: [detect-changes, build-images]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    steps:
      - name: Trigger Coolify Deployments
        env:
          APPS_DEPLOYED: ${{ needs.detect-changes.outputs.apps_deployed }}
        run: |
          declare -A uuids=(
            ["api"]="gg2jvzuela1o5935uppb0379"
            ["admin"]="z8uae7wusm0mrwciub1pdlsc"
            ["platform"]="npuggfu15bwbi78fifi9qfot"
            ["league-site"]="gawwisg6og45069vs4iw5l12"
            ["marketing-site"]="vswoggggksg2libzsuuevfpf"
          )

          DEPLOYED=0
          for app in $(echo "$APPS_DEPLOYED" | jq -r '.[]'); do
            uuid="${uuids[$app]}"
            if [ -z "$uuid" ]; then continue; fi
            echo "Deploying $app (uuid: $uuid)..."
            response=$(curl -s -w "\n%{http_code}" \
              -X GET "https://coolify.gruesshaber.eu/api/v1/deploy?uuid=${uuid}&force=false" \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}")
            http_code=$(echo "$response" | tail -1)
            body=$(echo "$response" | head -n -1)
            echo "  Response ($http_code): $body"
            if [ "$http_code" -ge 400 ]; then
              echo "::warning::Failed to trigger deployment for $app (HTTP $http_code)"
            fi
            DEPLOYED=$((DEPLOYED + 1))
          done

          echo "Triggered $DEPLOYED deployment(s)."

      - name: Deployment summary
        env:
          APPS_DEPLOYED: ${{ needs.detect-changes.outputs.apps_deployed }}
        run: |
          declare -A uuids=(
            ["api"]="gg2jvzuela1o5935uppb0379"
            ["admin"]="z8uae7wusm0mrwciub1pdlsc"
            ["platform"]="npuggfu15bwbi78fifi9qfot"
            ["league-site"]="gawwisg6og45069vs4iw5l12"
            ["marketing-site"]="vswoggggksg2libzsuuevfpf"
          )

          echo "## Coolify Deployments Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | UUID |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          for app in $(echo "$APPS_DEPLOYED" | jq -r '.[]'); do
            echo "| $app | \`${uuids[$app]}\` |" >> $GITHUB_STEP_SUMMARY
          done
