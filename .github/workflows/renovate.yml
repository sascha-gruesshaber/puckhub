name: Renovate

on:
  # Weekly Monday 5am CET (3am UTC in winter, adjust if needed)
  schedule:
    - cron: "0 3 * * 1"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.5
        env:
          RENOVATE_GIT_AUTHOR: "Renovate Bot <renovate@puckhub.dev>"
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
