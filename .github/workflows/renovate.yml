name: Renovate

on:
  # Weekly Monday 5am CET (3am UTC in winter, adjust if needed)
  schedule:
    - cron: "0 3 * * 1"
  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v41
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: renovate.json
